<!-- ============================================================
     BRAVA — HEAD SNIPPET v1.0
     Paste this inside <head> on every page of your project.
     Update the content="" meta values to match your project.
     ============================================================ -->

<!-- Charset & Viewport -->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Primary Meta -->
<title>Brava</title>
<meta name="description" content="Brava — [your project tagline here]" />
<meta name="author" content="Brava" />
<meta name="theme-color" content="#BF4646" />

<!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
<meta property="og:type"        content="website" />
<meta property="og:url"         content="https://yourdomain.com/" />
<meta property="og:title"       content="Brava" />
<meta property="og:description" content="[Your project description]" />
<meta property="og:image"       content="/favicons/og-image.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height"content="630" />

<!-- Twitter Card -->
<meta name="twitter:card"       content="summary_large_image" />
<meta name="twitter:title"      content="Brava" />
<meta name="twitter:description"content="[Your project description]" />
<meta name="twitter:image"      content="/favicons/og-image.png" />

<!-- Favicons -->
<link rel="icon"              type="image/x-icon"       href="/favicons/favicon.ico" />
<link rel="icon"              type="image/svg+xml"      href="/favicons/favicon.svg" />
<link rel="icon"              type="image/png" sizes="16x16"  href="/favicons/favicon-16x16.png" />
<link rel="icon"              type="image/png" sizes="32x32"  href="/favicons/favicon-32x32.png" />
<link rel="icon"              type="image/png" sizes="96x96"  href="/favicons/favicon-96x96.png" />
<link rel="apple-touch-icon"  sizes="180x180"            href="/favicons/apple-touch-icon.png" />
<link rel="manifest"                                     href="/favicons/site.webmanifest" />
<meta name="msapplication-config" content="/favicons/browserconfig.xml" />
<meta name="msapplication-TileColor" content="#BF4646" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<!-- Brand Tokens -->
<link rel="stylesheet" href="/assets/tokens.css" />
